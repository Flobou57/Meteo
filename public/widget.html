<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1923">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Météo Widget">
  <link rel="apple-touch-icon" href="/Meteo/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/Meteo/favicon.svg">
  <title>Météo Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
      color: #e4e8ec;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
      -webkit-font-smoothing: antialiased;
    }

    .widget-container {
      max-width: 400px;
      margin: 0 auto;
      padding: 16px 0;
    }

    /* Bloc principal : température du jour */
    .hero {
      text-align: center;
      padding: 20px 12px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      margin-bottom: 12px;
    }
    .hero .city {
      font-size: 0.85rem;
      color: #8899a6;
      margin-bottom: 4px;
    }
    .hero .icon {
      font-size: 3rem;
      line-height: 1;
    }
    .hero .temp {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin: 4px 0;
    }
    .hero .desc {
      font-size: 0.9rem;
      color: #8899a6;
    }
    .hero .minmax {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
      font-size: 0.85rem;
    }
    .hero .minmax .hi { color: #ff8c42; font-weight: 600; }
    .hero .minmax .lo { color: #42b0ff; font-weight: 600; }

    /* Stats rapides */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-box {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 8px;
      text-align: center;
    }
    .stat-box .label {
      font-size: 0.6rem;
      color: #5b6b7a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-box .value {
      font-size: 0.95rem;
      font-weight: 700;
      margin-top: 2px;
    }

    /* Prévisions de la semaine */
    .forecast {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
    }
    .forecast h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8899a6;
      margin-bottom: 8px;
    }
    .day-row {
      display: grid;
      grid-template-columns: 52px 28px 38px 1fr 38px;
      align-items: center;
      gap: 6px;
      padding: 7px 4px;
      border-radius: 8px;
    }
    .day-row.today {
      background: rgba(74, 158, 255, 0.1);
    }
    .day-row .name {
      font-size: 0.78rem;
      color: #8899a6;
    }
    .day-row.today .name {
      color: #6cb4ff;
      font-weight: 600;
    }
    .day-row .day-icon {
      font-size: 1rem;
    }
    .day-row .lo {
      font-size: 0.75rem;
      color: #42b0ff;
      text-align: right;
    }
    .day-row .hi {
      font-size: 0.75rem;
      font-weight: 600;
      color: #ff8c42;
    }
    .bar-bg {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.06);
      position: relative;
    }
    .bar-fill {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #42b0ff, #ff8c42);
    }

    /* Lien vers l'app complète */
    .open-app {
      display: block;
      text-align: center;
      margin-top: 12px;
      padding: 12px;
      background: rgba(74,158,255,0.15);
      border: 1px solid rgba(74,158,255,0.3);
      border-radius: 14px;
      color: #6cb4ff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #5b6b7a;
    }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Rafraîchir */
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(74,158,255,0.2);
      border: 1px solid rgba(74,158,255,0.3);
      color: #6cb4ff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .refresh-btn:active { opacity: 0.7; transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="widget-container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      Chargement...
    </div>
  </div>

  <button class="refresh-btn" onclick="loadWeather()" title="Rafraîchir">↻</button>

  <script>
    // Codes météo → icône
    const weatherIcons = {
      0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
      45: "🌫️", 48: "🌫️",
      51: "🌦️", 53: "🌦️", 55: "🌧️",
      61: "🌧️", 63: "🌧️", 65: "🌧️",
      71: "🌨️", 73: "🌨️", 75: "❄️",
      80: "🌦️", 81: "🌧️", 82: "⛈️",
      95: "⛈️", 96: "⛈️", 99: "⛈️",
    };
    const weatherLabels = {
      0: "Dégagé", 1: "Dégagé", 2: "Nuageux", 3: "Couvert",
      45: "Brouillard", 48: "Brouillard",
      51: "Bruine", 53: "Bruine", 55: "Bruine",
      61: "Pluie", 63: "Pluie", 65: "Forte pluie",
      71: "Neige", 73: "Neige", 75: "Neige",
      80: "Averses", 81: "Averses", 82: "Averses",
      95: "Orage", 96: "Orage", 99: "Orage",
    };

    const dayNames = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

    // Géolocalisation ou ville par défaut
    async function getCoords() {
      try {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 })
        );
        return { lat: pos.coords.latitude, lon: pos.coords.longitude, city: null };
      } catch {
        // Fallback: Metz
        return { lat: 49.12, lon: 6.18, city: "Metz" };
      }
    }

    async function getCityName(lat, lon) {
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=&count=1&language=fr&latitude=${lat}&longitude=${lon}`);
        // Reverse geocoding pas dispo sur open-meteo, on utilise le nom sauvegardé
        return null;
      } catch { return null; }
    }

    async function loadWeather() {
      const app = document.getElementById("app");
      app.innerHTML = '<div class="loading"><div class="spinner"></div>Chargement...</div>';

      try {
        const coords = await getCoords();
        const { lat, lon } = coords;

        // Récupérer la météo
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();

        // Récupérer le nom de la ville via reverse geocoding
        let cityName = coords.city || "Ma position";
        try {
          const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=fr`);
          const geoData = await geoRes.json();
          cityName = geoData.address?.city || geoData.address?.town || geoData.address?.village || cityName;
        } catch {}

        const current = data.current;
        const daily = data.daily;
        const code = current.weather_code;
        const icon = weatherIcons[code] || "❓";
        const label = weatherLabels[code] || "Inconnu";

        // Calcul min/max global pour la barre
        const allMax = Math.max(...daily.temperature_2m_max);
        const allMin = Math.min(...daily.temperature_2m_min);
        const range = allMax - allMin || 1;

        // Générer les jours
        let daysHtml = "";
        for (let i = 0; i < 7; i++) {
          const d = new Date(daily.time[i]);
          const name = i === 0 ? "Auj." : dayNames[d.getDay()];
          const hi = Math.round(daily.temperature_2m_max[i]);
          const lo = Math.round(daily.temperature_2m_min[i]);
          const dIcon = weatherIcons[daily.weather_code[i]] || "❓";
          const leftPct = ((lo - allMin) / range) * 100;
          const widthPct = Math.max(((hi - lo) / range) * 100, 8);

          daysHtml += `
            <div class="day-row ${i === 0 ? 'today' : ''}">
              <span class="name">${name}</span>
              <span class="day-icon">${dIcon}</span>
              <span class="lo">${lo}°</span>
              <div class="bar-bg"><div class="bar-fill" style="left:${leftPct}%;width:${widthPct}%"></div></div>
              <span class="hi">${hi}°</span>
            </div>`;
        }

        app.innerHTML = `
          <div class="hero">
            <div class="city">${cityName}</div>
            <div class="icon">${icon}</div>
            <div class="temp">${Math.round(current.temperature_2m)}°</div>
            <div class="desc">${label}</div>
            <div class="minmax">
              <span class="hi">↑ ${Math.round(daily.temperature_2m_max[0])}°</span>
              <span class="lo">↓ ${Math.round(daily.temperature_2m_min[0])}°</span>
            </div>
          </div>

          <div class="quick-stats">
            <div class="stat-box">
              <div class="label">Ressenti</div>
              <div class="value">${Math.round(current.apparent_temperature)}°</div>
            </div>
            <div class="stat-box">
              <div class="label">Humidité</div>
              <div class="value">${current.relative_humidity_2m}%</div>
            </div>
            <div class="stat-box">
              <div class="label">Vent</div>
              <div class="value">${Math.round(current.wind_speed_10m)} km/h</div>
            </div>
          </div>

          <div class="forecast">
            <h3>Prévisions 7 jours</h3>
            ${daysHtml}
          </div>

          <a href="/Meteo/" class="open-app">Ouvrir le dashboard complet →</a>
        `;
      } catch (err) {
        app.innerHTML = `<div class="loading" style="color:#ef4444">Erreur de chargement.<br><small>${err.message}</small></div>`;
      }
    }

    // Charger au démarrage
    loadWeather();

    // Auto-refresh toutes les 15 minutes
    setInterval(loadWeather, 15 * 60 * 1000);
  </script>
</body>
</html>
